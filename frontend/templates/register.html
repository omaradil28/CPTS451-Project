{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body">
                {% if account_exists %}
                <div style="
                    background-color: #f8d7da;
                    color: #842029;
                    border: 1px solid #f5c2c7;
                    padding: 12px 16px;
                    border-radius: 6px;
                    margin: 10px 0;
                    font-weight: 500;
                ">
                    An account with that email already exists.
                </div>
                {% endif %}
                <h3 class="text-center mb-4">Register Account</h3>
                <form action="{{ url_for('submit_registration') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="name" class="form-control" placeholder="John Doe" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">WSU Email</label>
                        <input type="email" name="email" class="form-control" placeholder="name@wsu.edu" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <select class="form-select" name="role">
                            <option value="student">Student</option>
                            <option value="technician">Technician</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">Register</button>
                </form>
                <hr>
                <p class="text-center small">Already registered? <a href="{{ url_for('login') }}">Log in</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
