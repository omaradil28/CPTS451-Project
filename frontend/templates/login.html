{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 mt-5">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Researcher Sign In</h3>
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form action="{{ url_for('submit_login') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">WSU Email</label>
                        <input type="email" name="email" class="form-control" placeholder="name@wsu.edu" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
                </form>
                <hr>
                <p class="text-center mb-0">New to the lab? <a href="{{ url_for('register') }}">Create an account</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
